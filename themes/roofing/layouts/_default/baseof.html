<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}" class="no-js">
<head>
  {{- partial "head/meta.html" . -}}
  {{- partial "head/styles.html" . -}}
</head>
<body class="{{ block "body-class" . }}{{ end }}">
  {{- partial "header.html" . -}}
  <main id="main-content" data-pagefind-body>
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . -}}
  {{- partial "scripts.html" . -}}
</body>
</html>
