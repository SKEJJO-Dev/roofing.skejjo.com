<!-- Netlify Identity Widget (for Decap CMS) -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<!-- Pagefind -->
{{- if .Site.Params.enableSearch }}
<script src="/pagefind/pagefind-ui.js"></script>
{{- end }}

<!-- Main JS -->
<script>
(function() {
  'use strict';

  // Header scroll behavior
  var header = document.getElementById('site-header');
  if (header) {
    var isHome = document.body.classList.contains('page-home');
    if (isHome) header.classList.add('transparent');

    window.addEventListener('scroll', function() {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
        header.classList.remove('transparent');
      } else {
        header.classList.remove('scrolled');
        if (isHome) header.classList.add('transparent');
      }
    }, { passive: true });
  }

  // Mobile navigation
  var hamburger = document.getElementById('hamburger');
  var mobileNav = document.getElementById('mobile-nav');
  if (hamburger && mobileNav) {
    hamburger.addEventListener('click', function() {
      var isOpen = mobileNav.classList.contains('open');
      mobileNav.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', String(!isOpen));
      mobileNav.setAttribute('aria-hidden', String(isOpen));
      document.body.style.overflow = isOpen ? '' : 'hidden';
    });

    mobileNav.querySelectorAll('.mobile-nav-link').forEach(function(link) {
      link.addEventListener('click', function() {
        mobileNav.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        mobileNav.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      });
    });
  }

  // Remove no-js class
  document.documentElement.classList.remove('no-js');

  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
    anchor.addEventListener('click', function(e) {
      var href = this.getAttribute('href');
      if (href === '#') return;
      var target = document.querySelector(href);
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // Contact form submission (Netlify)
  var contactForm = document.getElementById('contact-form');
  if (contactForm) {
    contactForm.addEventListener('submit', function() {
      var btn = contactForm.querySelector('[type="submit"]');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Sending...';
      }
    });
  }

  // Initialize Pagefind on search page
  if (typeof PagefindUI !== 'undefined') {
    var searchEl = document.getElementById('pagefind-search');
    if (searchEl) {
      new PagefindUI({
        element: '#pagefind-search',
        showSubResults: true,
        showImages: true,
      });
    }
  }

  // Netlify Identity redirect for CMS
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', function(user) {
      if (!user) {
        window.netlifyIdentity.on('login', function() {
          document.location.href = '/admin/';
        });
      }
    });
  }
})();
</script>
