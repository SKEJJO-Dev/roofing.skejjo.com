[build]
  publish = "public"
  command = "hugo --minify && npx -y pagefind --site public"

[build.environment]
  HUGO_VERSION = "0.145.0"
  HUGO_ENVIRONMENT = "production"
  NODE_VERSION = "20"
  TZ = "America/Chicago"

[context.production]
  command = "hugo --minify && npx -y pagefind --site public"
  [context.production.environment]
    HUGO_ENVIRONMENT = "production"
    HUGO_BASEURL = "https://roofing.skejjo.com"

[context.deploy-preview]
  command = "hugo --minify -b $DEPLOY_PRIME_URL && npx -y pagefind --site public"
  [context.deploy-preview.environment]
    HUGO_ENVIRONMENT = "staging"

[context.branch-deploy]
  command = "hugo --minify -b $DEPLOY_PRIME_URL && npx -y pagefind --site public"

# Redirects
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/cms"
  to = "/admin/index.html"
  status = 301

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://identity.netlify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.netlify.com https://*.netlify.com"

[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
